<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.U.G Fan-Portfolio 🐾</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #A799B7;
            --dark: #6D5E7D;
            --light: #F9F7FA;
            --accent: #E8E2EE;
            --text: #5A545E;
            --mcd: #B5A17A;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--light);
            color: var(--text);
            margin: 0; padding: 0;
            overflow-x: hidden; /* 横から出る画像によるハミ出し防止 */
            background-image: url("data:image/svg+xml,%3Csvg width='500' height='250' viewBox='0 0 500 250' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='0' y='120' fill='%23A799B7' fill-opacity='0.08' font-family='cursive' font-size='32' font-style='italic' transform='rotate(-15, 250, 125)'%3EMega urtr giga . . . Mega urtr giga . . .%3C/text%3E%3C/svg%3E");
            background-repeat: repeat;
            background-attachment: fixed;
        }

        header {
            text-align: center;
            padding: 4.5rem 1.5rem;
            background: linear-gradient(180deg, #E0D7E8 0%, var(--light) 100%);
            color: var(--dark);
        }

        .main-visual { font-family: "Times New Roman", serif; font-size: 3.2rem; margin: 0; font-weight: 200; letter-spacing: 0.15rem; }
        .sub-name { display: block; margin-top: 0.8rem; font-size: 0.75rem; letter-spacing: 0.4rem; font-weight: 300; opacity: 0.7; }
        .fanmark { display: inline-block; margin-top: 1.5rem; padding: 5px 16px; background: var(--glass); border: 1px solid var(--accent); border-radius: 50px; font-size: 0.8rem; backdrop-filter: blur(5px); color: var(--dark); }

        .container { max-width: 550px; margin: 0 auto; padding: 2rem 1.2rem; }

        /* カードと画像の親要素 */
        .card-wrapper {
            position: relative;
            margin-bottom: 5rem;
        }

        /* カード本体 */
        .reveal { 
            position: relative;
            background: white;
            padding: 2.2rem 1.8rem 1.8rem;
            border-radius: 12px;
            border: 1px solid rgba(167, 153, 183, 0.15);
            box-shadow: 0 10px 30px rgba(109, 94, 125, 0.05);
            z-index: 2;
            opacity: 0; 
            transform: translateY(30px); 
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1); 
        }

        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 横から飛び出す画像の設定 */
        .slide-img {
            position: absolute;
            width: 180px; /* 画像のサイズ */
            height: auto;
            border-radius: 10px;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1;
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }

        /* 奇数（左から） */
        .img-left {
            left: -140px;
            top: -20px;
            transform: translateX(-100px) rotate(-15deg);
        }

        /* 偶数（右から） */
        .img-right {
            right: -140px;
            bottom: -20px;
            transform: translateX(100px) rotate(15deg);
        }

        /* 3枚目（左から下め） */
        .img-left-low {
            left: -160px;
            bottom: -30px;
            transform: translateX(-100px) rotate(-10deg);
        }

        /* アクティブ時の動き */
        .card-wrapper.active .img-left { opacity: 1; transform: translateX(0) rotate(-5deg); }
        .card-wrapper.active .img-right { opacity: 1; transform: translateX(0) rotate(5deg); }
        .card-wrapper.active .img-left-low { opacity: 1; transform: translateX(0) rotate(-8deg); }

        /* スマホ等では画像を非表示 */
        @media (max-width: 1000px) {
            .slide-img { display: none; }
        }

        /* 猫アニメーション（元の設定） */
        .walking-cat {
            position: absolute; top: -42px; width: 55px; height: 45px;
            animation: walk-path 20s linear infinite; z-index: 10; cursor: pointer;
        }
        @keyframes walk-path {
            0% { left: -5%; transform: scaleX(1); }
            50% { left: 90%; transform: scaleX(-1); }
            100% { left: -5%; transform: scaleX(1); }
        }
        .walking-cat svg { fill: var(--primary); }
        .leg-1 { animation: leg-move-1 0.4s steps(2) infinite; }
        .leg-2 { animation: leg-move-2 0.4s steps(2) infinite; }
        @keyframes leg-move-1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-2px, -3px); } }
        @keyframes leg-move-2 { 0%, 100% { transform: translate(-2px, -3px); } 50% { transform: translate(0, 0); } }

        .mcd-badge { display: inline-flex; align-items: center; gap: 8px; padding: 5px 14px; border: 1px solid var(--mcd); border-radius: 4px; font-size: 0.75rem; color: var(--mcd); margin-bottom: 1.5rem; }
        .profile-box { background: #FBF9FC; padding: 1.2rem; border-radius: 8px; margin-bottom: 1.5rem; border-left: 2px solid var(--primary); font-size: 0.9rem; line-height: 1.8; }
        h2 { font-size: 0.85rem; color: var(--dark); border-bottom: 1px solid var(--accent); padding-bottom: 8px; margin-bottom: 1rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 1rem; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 10px; border-radius: 6px; text-decoration: none; font-size: 0.8rem; color: var(--dark); background: var(--light); border: 1px solid var(--accent); transition: 0.3s; }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }
        .btn-contact { background: var(--dark); color: white; border: none; grid-column: span 2; margin-top: 10px; }
        footer { text-align: center; padding: 4rem 2rem; font-size: 0.7rem; color: var(--dark); opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <span style="font-size: 0.6rem; opacity: 0.6; letter-spacing: 0.1rem; display: block; margin-bottom: 0.5rem;">Unofficial Fan-made Site</span>
    <h1 class="main-visual">Mega urtr giga</h1>
    <span class="sub-name">メガ・ウルトラギガ</span>
    <div class="fanmark">ファンマ : 👊💜</div>
</header>

<div class="container">
    <div class="card-wrapper">
        <img src="https://images.weserv.nl/?url=https://raw.githubusercontent.com/otofune/img-hosting/main/mega0.png" class="slide-img img-left" alt="">
        
        <div class="reveal">
            <div class="walking-cat">
                <svg viewBox="0 0 55 45"><path d="M12,20 Q6,15 9,10" stroke="currentColor" stroke-width="2.8" fill="none" /><rect x="12" y="15" width="24" height="14" rx="7" /><circle cx="36" cy="19.5" r="8" /><path d="M30,13 L33,6 L38,13 Z" /><rect class="leg-1" x="32" y="26" width="3" height="8" rx="1.5" /><rect class="leg-2" x="14" y="26" width="3" height="8" rx="1.5" /></svg>
            </div>
            <div class="mcd-badge"><i class="fas fa-cat"></i> 週5マック通いの猫</div>
            <div class="profile-box">語尾が「ニャン」の猫系ストリーマー。<br>とにかく元気いっぱいだニャン！</div>
            <h2><i class="fas fa-user-circle"></i> ABOUT</h2>
            <p style="font-size: 0.9rem;">所属：321.inc<br>目標：Live 3D化！</p>
        </div>
    </div>

    <div class="card-wrapper">
        <img src="https://images.weserv.nl/?url=https://raw.githubusercontent.com/otofune/img-hosting/main/mega1.png" class="slide-img img-right" alt="">
        
        <div class="reveal">
            <h2><i class="fas fa-link"></i> LINK LIST</h2>
            <div class="btn-grid">
                <a href="https://x.com/mega_urtr" class="btn" target="_blank"><i class="fab fa-twitter"></i> <span>X</span></a>
                <a href="https://youtube.com/@mega321inc" class="btn" target="_blank"><i class="fab fa-youtube"></i> <span>YouTube</span></a>
                <a href="https://ncode.syosetu.com/n4943kq/" class="btn" target="_blank"><i class="fas fa-book"></i> <span>なろう</span></a>
                <a href="https://forms.gle/9zrAg8KVikACMqfP9" class="btn btn-contact" target="_blank"><i class="fas fa-envelope"></i> <span>編集者に連絡</span></a>
            </div>
        </div>

        <img src="https://images.weserv.nl/?url=https://raw.githubusercontent.com/otofune/img-hosting/main/mega2.png" class="slide-img img-left-low" alt="">
    </div>
</div>

<footer>© Mega urtr giga Fan-made Portfolio</footer>

<script>
    window.onload = () => {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const wrapper = entry.target.closest('.card-wrapper');
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    if (wrapper) wrapper.classList.add('active');
                } else {
                    entry.target.classList.remove('active');
                    if (wrapper) wrapper.classList.remove('active');
                }
            });
        }, { rootMargin: "-10% 0px", threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    };
</script>
</body>
</html>
